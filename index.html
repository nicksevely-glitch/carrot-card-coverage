<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrot Card Coverage</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; }
      input::placeholder { color: #64748b; }
      select option { background: #111118; color: #e2e8f0; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a40; border-radius: 4px; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useMemo, useRef, useEffect } = React;

      const LOCALLY_ISSUED = new Set([
        "Austria","Belgium","Bulgaria","Croatia","Cyprus","Czech Republic","Denmark",
        "Estonia","Finland","France","Germany","Greece","Hungary","Ireland","Italy",
        "Latvia","Lithuania","Luxembourg","Malta","Netherlands","Poland","Portugal",
        "Romania","Slovakia","Slovenia","Spain","Sweden","Iceland","Liechtenstein",
        "Norway","Switzerland","United States","Australia","Singapore","Israel",
        "Canada","Hong Kong","United Kingdom",
      ]);

      const CROSS_BORDER_SINGAPORE = new Set([
        "Mexico","Brazil","New Zealand","Malaysia","United Arab Emirates","Philippines",
        "Thailand","Argentina","Colombia","Chile","Turkey","Costa Rica","Egypt","Peru",
        "Dominican Republic","Ecuador","Georgia","Bosnia & Herzegovina","Belarus",
        "Ghana","Paraguay","Montenegro","Uzbekistan","Uganda","Kazakhstan","Guatemala",
        "Trinidad & Tobago","Tunisia","Jamaica","Kyrgyzstan","Uruguay",
      ]);

      const EEA = new Set([
        "Austria","Belgium","Bulgaria","Croatia","Cyprus","Czech Republic","Denmark",
        "Estonia","Finland","France","Germany","Greece","Hungary","Ireland","Italy",
        "Latvia","Lithuania","Luxembourg","Malta","Netherlands","Poland","Portugal",
        "Romania","Slovakia","Slovenia","Spain","Sweden","Iceland","Liechtenstein",
        "Norway","Switzerland",
      ]);

      const HIGH_RISK_INDUSTRIES = [
        "Adult Content & Related Services",
        "Gambling Services & Games of Skill",
        "Illegal Drugs & Controlled Substances",
        "Counterfeit or Unauthorised Goods",
        "Weapons Manufacturing, Sales, & Supplies",
        "Payday & Predatory Lending",
        "Hate Speech & Discrimination",
        "Ponzi / Pyramid Scheme / Multi Level Marketing / Telemarketing",
        "Sale, Distribution, & Trade of Endangered Animal Species",
        "Sale, Distribution, & Trade of Archaeological and Cultural Relics",
        "Sale of Access to Cyberlockers or Remote Digital File-Sharing Services",
        "Human Remains and Body Parts",
        "Transactions Made for No Genuine Commercial Purpose",
        "Offering of Regulated Financial Services",
        "Sale and Distribution of Unlicensed Products or Services",
        "Other Businesses or Transactions Outside of Our Risk Appetite",
      ];

      const DEV_CONFIGS = [
        {
          key: "billing",
          label: "Carrot Card Issuing Billing Currency",
          options: [
            { label: "USD", devTime: 0 },
            { label: "Non-USD", devTime: "6–8" },
          ],
        },
        {
          key: "funding",
          label: "Funding Structure",
          options: [
            { label: "Standard", devTime: 0 },
            { label: "PLP", devTime: "TBD" },
          ],
        },
        {
          key: "oop",
          label: "OOP Reimbursements",
          options: [
            { label: "Carrot", devTime: 12 },
            { label: "Client-Payroll", devTime: 0 },
          ],
        },
      ];

      const ALL_WORLD_COUNTRIES = [
        "Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda",
        "Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain",
        "Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia",
        "Bosnia & Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso",
        "Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic",
        "Chad","Chile","China","Colombia","Comoros","Congo","Costa Rica","Croatia","Cuba",
        "Cyprus","Czech Republic","Denmark","Djibouti","Dominica","Dominican Republic",
        "Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini",
        "Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana",
        "Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras",
        "Hong Kong","Hungary","Iceland","India","Indonesia","Iraq","Ireland","Israel",
        "Italy","Ivory Coast","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati",
        "Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya",
        "Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia",
        "Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico",
        "Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique",
        "Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua",
        "Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan",
        "Palau","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland",
        "Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis",
        "Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino",
        "Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore",
        "Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea",
        "South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland",
        "Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga",
        "Trinidad & Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine",
        "United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan",
        "Vanuatu","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe",
      ].sort();

      function getCoverageInfo(contractingCountries, coverageCountry) {
        if (!contractingCountries || contractingCountries.length === 0 || !coverageCountry) return null;

        const isLocallyIssued = LOCALLY_ISSUED.has(coverageCountry);
        const isCrossBorder = CROSS_BORDER_SINGAPORE.has(coverageCountry);
        const isSingaporeCoverage = coverageCountry === "Singapore";
        const isSGProgram = isCrossBorder || isSingaporeCoverage;

        if (!isLocallyIssued && !isCrossBorder) {
          return { status: "not_supported", label: "Not Supported", issuingEntity: null, detail: `${coverageCountry} is not currently supported by Airwallex card issuance.`, kycRegions: [] };
        }

        const coverageIsEEA = EEA.has(coverageCountry);
        const hasEEAEntity = contractingCountries.some(c => EEA.has(c));
        const hasCrossBorderOrSGEntity = contractingCountries.some(c => CROSS_BORDER_SINGAPORE.has(c) || c === "Singapore");
        const hasLocallyIssuedEntity = contractingCountries.some(c => LOCALLY_ISSUED.has(c));

        if (isSGProgram) {
          if (hasCrossBorderOrSGEntity) {
            return { status: "supported", label: "Cross-Border (via SG)", issuingEntity: "Singapore", detail: "Issued via Airwallex Singapore. Standard Singapore KYC applies.", kycRegions: ["Singapore"] };
          }
          if (!hasLocallyIssuedEntity) {
            return { status: "not_eligible", label: "Not Eligible", issuingEntity: null, detail: "Customer must have an entity in at least one Airwallex-supported country to access Singapore cross-border issuance.", kycRegions: [] };
          }
          const localAnchor = contractingCountries.find(c => LOCALLY_ISSUED.has(c));
          const localKYC = EEA.has(localAnchor) ? "Netherlands (EEA)" : localAnchor;
          return { status: "conditional", label: "Cross-Border (via SG)", issuingEntity: "Singapore", detail: "Requires Singapore KYC for cross-border access.", kycRegions: [localKYC, "Singapore"] };
        }

        if (contractingCountries.includes(coverageCountry)) {
          const kyc = coverageIsEEA ? "Netherlands (EEA)" : coverageCountry;
          return { status: "supported", label: "Local Issuance", issuingEntity: coverageIsEEA ? "Netherlands (EEA)" : "Local Airwallex entity", detail: "Customer has an entity here. Issued locally. Standard regional KYC applies.", kycRegions: [kyc] };
        }
        if (coverageIsEEA && hasEEAEntity) {
          const anchor = contractingCountries.find(c => EEA.has(c));
          return { status: "supported", label: "Local Issuance", issuingEntity: "Netherlands (EEA)", detail: `Customer has an EEA entity (${anchor}). Issued via Airwallex Netherlands. Standard Netherlands KYC applies.`, kycRegions: ["Netherlands (EEA)"] };
        }
        return { status: "not_eligible", label: "Not Eligible", issuingEntity: null, detail: coverageIsEEA ? "Requires a business entity in an EEA country." : `Requires a business entity in ${coverageCountry}.`, kycRegions: [] };
      }

      function contractingDot(country) {
        if (LOCALLY_ISSUED.has(country) || CROSS_BORDER_SINGAPORE.has(country)) return "#22c55e";
        return "#64748b";
      }

      function getDotColor(contractingCountries, coverageCountry) {
        if (!contractingCountries || contractingCountries.length === 0) {
          if (LOCALLY_ISSUED.has(coverageCountry)) return "#22c55e";
          if (CROSS_BORDER_SINGAPORE.has(coverageCountry)) return "#f59e0b";
          return "#64748b";
        }
        const result = getCoverageInfo(contractingCountries, coverageCountry);
        if (!result) return "#64748b";
        const colors = { supported: "#22c55e", kyc_required: "#f59e0b", conditional: "#f59e0b", not_supported: "#64748b", not_eligible: "#ef4444" };
        return colors[result.status] || "#64748b";
      }

      const statusConfig = {
        supported:     { dot: "#22c55e", text: "#86efac", pill: "#14532d", pillLabel: "No Add. KYC" },
        kyc_required:  { dot: "#f59e0b", text: "#fcd34d", pill: "#78350f", pillLabel: "KYC Req'd" },
        conditional:   { dot: "#f59e0b", text: "#fcd34d", pill: "#78350f", pillLabel: "Cond." },
        not_supported: { dot: "#64748b", text: "#94a3b8", pill: "#1e293b", pillLabel: "Not Supported" },
        not_eligible:  { dot: "#ef4444", text: "#fca5a5", pill: "#7f1d1d", pillLabel: "Not Eligible" },
      };

      function TagInput({ label, options, selected, onAdd, onRemove, placeholder, dotFn }) {
        const [query, setQuery] = useState("");
        const [open, setOpen] = useState(false);
        const inputRef = useRef(null);
        const filtered = useMemo(() =>
          options.filter(c => c.toLowerCase().includes(query.toLowerCase()) && !selected.includes(c)).slice(0, 80),
          [query, selected]
        );
        return (
          <div style={{ flex: "1 1 260px" }}>
            <label style={{ fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: "#94a3b8", display: "block", marginBottom: 7 }}>{label}</label>
            <div onClick={() => inputRef.current && inputRef.current.focus()}
              style={{ minHeight: 44, background: "#0d0d1a", border: `1px solid ${selected.length > 0 ? "#f97316" : "#2a2a40"}`, borderRadius: 8, padding: "6px 10px", display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center", cursor: "text" }}>
              {selected.map(c => (
                <span key={c} style={{ display: "inline-flex", alignItems: "center", gap: 5, background: "#1a1a2e", border: "1px solid #2d2d4e", borderRadius: 6, padding: "2px 8px 2px 6px", fontSize: 12, color: "#cbd5e1", whiteSpace: "nowrap" }}>
                  <span style={{ width: 6, height: 6, borderRadius: "50%", background: dotFn ? dotFn(c) : "#64748b", flexShrink: 0 }} />
                  {c}
                  <span onMouseDown={e => { e.preventDefault(); onRemove(c); }} style={{ marginLeft: 2, cursor: "pointer", color: "#94a3b8", fontSize: 14, lineHeight: 1 }}>x</span>
                </span>
              ))}
              <div style={{ position: "relative", flex: "1 1 120px", minWidth: 120 }}>
                <input ref={inputRef} value={query}
                  onChange={e => { setQuery(e.target.value); setOpen(true); }}
                  onFocus={() => setOpen(true)}
                  onBlur={() => setTimeout(() => setOpen(false), 160)}
                  placeholder={selected.length === 0 ? placeholder : "Add another..."}
                  style={{ width: "100%", background: "transparent", border: "none", color: "#e2e8f0", fontSize: 13, outline: "none", padding: "2px 0" }}
                />
                {open && filtered.length > 0 && (
                  <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, minWidth: 220, zIndex: 200, background: "#111118", border: "1px solid #2a2a40", borderRadius: 8, maxHeight: 200, overflowY: "auto", boxShadow: "0 8px 32px rgba(0,0,0,0.7)" }}>
                    {filtered.map(c => (
                      <div key={c} onMouseDown={() => { onAdd(c); setQuery(""); }}
                        style={{ padding: "8px 12px", cursor: "pointer", fontSize: 13, borderBottom: "1px solid #1a1a28", display: "flex", alignItems: "center", gap: 8, color: "#e2e8f0" }}
                        onMouseEnter={e => e.currentTarget.style.background = "#1a1a2e"}
                        onMouseLeave={e => e.currentTarget.style.background = "transparent"}
                      >
                        <span style={{ width: 6, height: 6, borderRadius: "50%", background: dotFn ? dotFn(c) : "#64748b", flexShrink: 0 }} />
                        {c}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      function ResultRow({ contracting, country, index }) {
        const result = getCoverageInfo(contracting, country);
        if (!result) return null;
        const sc = statusConfig[result.status] || statusConfig.not_supported;
        return (
          <div style={{ display: "grid", gridTemplateColumns: "160px 1fr auto", alignItems: "start", gap: 16, padding: "14px 18px", background: index % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent", borderBottom: "1px solid #1a1a26", animation: "fadeIn 0.2s ease" }}>
            <div style={{ fontSize: 13, fontWeight: 600, color: "#e2e8f0", paddingTop: 1 }}>{country}</div>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 4 }}>
                <span style={{ width: 7, height: 7, borderRadius: "50%", background: sc.dot, boxShadow: `0 0 6px ${sc.dot}`, flexShrink: 0 }} />
                <span style={{ fontSize: 12, fontWeight: 600, color: sc.text }}>{result.label}</span>
                {result.issuingEntity && <span style={{ fontSize: 11, color: "#94a3b8" }}>via {result.issuingEntity}</span>}
              </div>
              <div style={{ fontSize: 12, color: "#94a3b8", lineHeight: 1.5 }}>{result.detail}</div>
              {result.kycRegions && result.kycRegions.length > 0 && (
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em" }}>KYC:</span>
                  {result.kycRegions.map((region, i) => (
                    <span key={region} style={{ display: "inline-flex", alignItems: "center", background: i === 0 ? "#0f2027" : "#1a1a0f", border: `1px solid ${i === 0 ? "#1e4d6b" : "#3d3d1a"}`, borderRadius: 6, padding: "2px 8px", fontSize: 11, color: i === 0 ? "#7dd3fc" : "#fcd34d", whiteSpace: "nowrap" }}>
                      {region}
                    </span>
                  ))}
                </div>
              )}
            </div>
            <div style={{ background: sc.pill, borderRadius: 6, padding: "2px 8px", fontSize: 10, fontWeight: 700, color: sc.text, textTransform: "uppercase", letterSpacing: "0.08em", whiteSpace: "nowrap", alignSelf: "center" }}>
              {sc.pillLabel}
            </div>
          </div>
        );
      }

      function SummaryBar({ contracting, coverageCountries }) {
        const counts = useMemo(() => {
          const c = { supported: 0, kyc_required: 0, conditional: 0, not_supported: 0, not_eligible: 0 };
          coverageCountries.forEach(country => {
            const r = getCoverageInfo(contracting, country);
            if (r) c[r.status] = (c[r.status] || 0) + 1;
          });
          return c;
        }, [contracting, coverageCountries]);
        const total = coverageCountries.length;
        if (total === 0) return null;
        return (
          <div style={{ display: "flex", gap: 14, padding: "12px 18px", background: "#0d0d1a", borderBottom: "1px solid #1a1a26", flexWrap: "wrap", alignItems: "center" }}>
            {counts.supported > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#22c55e" }} /><strong style={{ color: "#e2e8f0" }}>{counts.supported}</strong> No Additional KYC</div>}
            {counts.kyc_required > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#f59e0b" }} /><strong style={{ color: "#e2e8f0" }}>{counts.kyc_required}</strong> KYC Required</div>}
            {counts.conditional > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#f59e0b" }} /><strong style={{ color: "#e2e8f0" }}>{counts.conditional}</strong> Cross-Border</div>}
            {counts.not_eligible > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#ef4444" }} /><strong style={{ color: "#e2e8f0" }}>{counts.not_eligible}</strong> Not Eligible</div>}
            {counts.not_supported > 0 && <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 12, color: "#94a3b8" }}><span style={{ width: 7, height: 7, borderRadius: "50%", background: "#64748b" }} /><strong style={{ color: "#e2e8f0" }}>{counts.not_supported}</strong> Not Supported</div>}
            <div style={{ marginLeft: "auto", fontSize: 12, color: "#94a3b8" }}>{total} countr{total === 1 ? "y" : "ies"}</div>
          </div>
        );
      }

      function TimelineNote({ contracting, coverageCountries, industry }) {
        const allKycRegions = useMemo(() => {
          const regions = new Set();
          coverageCountries.forEach(country => {
            const r = getCoverageInfo(contracting, country);
            if (!r || !r.kycRegions) return;
            r.kycRegions.forEach(region => regions.add(region));
          });
          return Array.from(regions);
        }, [contracting, coverageCountries]);

        const base = { width: "100%", maxWidth: 720, borderRadius: 12, padding: "14px 18px", marginBottom: 24, fontSize: 13, lineHeight: 1.7 };

        if (industry) {
          return (
            <div style={{ ...base, background: "#2e1a00", border: "1px solid #92400e", color: "#fcd34d" }}>
              <strong>Additional Review Required</strong> — This customer operates in a restricted industry (<em>{industry}</em>) and will need to undergo additional review. We don't have a distinct timeline for completion.
            </div>
          );
        }

        return (
          <div style={{ ...base, background: "#0d1a2e", border: "1px solid #1e3a5c", color: "#93c5fd" }}>
            <div>Onboarding with Airwallex typically takes <strong>1–2 weeks</strong>.</div>
            {allKycRegions.length > 0 && (
              <div style={{ marginTop: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em" }}>KYC Regions:</span>
                  {allKycRegions.map((region, i) => (
                    <span key={region} style={{ display: "inline-flex", alignItems: "center", background: i === 0 ? "#0f2027" : "#1a1a0f", border: `1px solid ${i === 0 ? "#1e4d6b" : "#3d3d1a"}`, borderRadius: 6, padding: "2px 8px", fontSize: 11, color: i === 0 ? "#7dd3fc" : "#fcd34d", whiteSpace: "nowrap" }}>
                      {region}
                    </span>
                  ))}
                </div>
                {allKycRegions.length > 1 && (
                  <div style={{ marginTop: 6, fontSize: 12, color: "#64748b" }}>
                    All KYC processes can be completed <strong style={{ color: "#93c5fd" }}>in parallel</strong>.
                  </div>
                )}
              </div>
            )}
          </div>
        );
      }

      const PRODUCT_REQUEST_URL = "https://carrotfertility.atlassian.net/jira/polaris/projects/PB/ideas/view/7465482";

      function DevEstimates() {
        const [selections, setSelections] = useState({ billing: "", funding: "", oop: "" });

        return (
          <div style={{ width: "100%", maxWidth: 720, marginTop: 32 }}>
            <h3 style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#94a3b8", marginBottom: 12 }}>Configurations</h3>
            <div style={{ background: "#111118", border: "1px solid #1e1e30", borderRadius: 16, overflow: "hidden" }}>
              {DEV_CONFIGS.map(({ key, label, options }, i) => {
                const sel = options.find(o => o.label === selections[key]);
                const devTime = sel ? sel.devTime : null;
                const isAvailable = devTime === 0;
                const isUnavailable = devTime !== null && devTime !== 0;
                return (
                  <div key={key} style={{ display: "grid", gridTemplateColumns: "1fr 180px 180px", alignItems: "center", gap: 16, padding: "14px 18px", background: i % 2 === 0 ? "rgba(255,255,255,0.02)" : "transparent", borderBottom: i < DEV_CONFIGS.length - 1 ? "1px solid #1a1a26" : "none" }}>
                    <div style={{ fontSize: 13, color: "#e2e8f0", fontWeight: 500 }}>{label}</div>
                    <select
                      value={selections[key]}
                      onChange={e => setSelections(prev => ({ ...prev, [key]: e.target.value }))}
                      style={{ background: "#0d0d1a", border: `1px solid ${selections[key] ? "#f97316" : "#2a2a40"}`, borderRadius: 8, padding: "7px 10px", color: selections[key] ? "#e2e8f0" : "#64748b", fontSize: 13, outline: "none", appearance: "none", WebkitAppearance: "none", cursor: "pointer", width: "100%" }}
                    >
                      <option value="">Select...</option>
                      {options.map(o => <option key={o.label} value={o.label}>{o.label}</option>)}
                    </select>
                    <div style={{ fontSize: 12, fontWeight: 600, textAlign: "right" }}>
                      {devTime === null && <span style={{ color: "#475569" }}>—</span>}
                      {isAvailable && <span style={{ color: "#86efac" }}>Available</span>}
                      {isUnavailable && (
                        <a href={PRODUCT_REQUEST_URL} target="_blank" rel="noopener noreferrer"
                          style={{ color: "#f87171", textDecoration: "none", display: "inline-flex", alignItems: "center", gap: 4 }}>
                          Not Currently Available
                          <span style={{ fontSize: 10 }}>↗</span>
                        </a>
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      function App() {
        const [contracting, setContracting] = useState([]);
        const [coverageCountries, setCoverageCountries] = useState([]);
        const [industry, setIndustry] = useState("");

        const addContracting = (c) => setContracting(prev => prev.includes(c) ? prev : [...prev, c]);
        const removeContracting = (c) => setContracting(prev => prev.filter(x => x !== c));
        const addCoverage = (c) => setCoverageCountries(prev => prev.includes(c) ? prev : [...prev, c]);
        const removeCoverage = (c) => setCoverageCountries(prev => prev.filter(x => x !== c));

        const showResults = contracting.length > 0 && coverageCountries.length > 0;

        return (
          <div style={{ minHeight: "100vh", background: "#0a0a0f", fontFamily: "'DM Sans', 'Segoe UI', sans-serif", color: "#e2e8f0", padding: "36px 24px", display: "flex", flexDirection: "column", alignItems: "center" }}>
            <div style={{ textAlign: "center", marginBottom: 36, maxWidth: 600 }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#1a1a2e", border: "1px solid #2d2d4e", borderRadius: 20, padding: "4px 14px", marginBottom: 18, fontSize: 11, letterSpacing: "0.12em", textTransform: "uppercase", color: "#818cf8" }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#818cf8", display: "inline-block" }} />
                Powered by Airwallex
              </div>
              <h1 style={{ fontSize: 30, fontWeight: 700, margin: "0 0 8px", background: "linear-gradient(135deg, #f97316 0%, #fb923c 50%, #fdba74 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", letterSpacing: "-0.02em" }}>
                Carrot Card Coverage
              </h1>
              <p style={{ color: "#94a3b8", fontSize: 14, margin: 0, lineHeight: 1.6 }}>Select the countries where the customer has entities, then add member coverage countries to check issuing eligibility</p>
            </div>

            <div style={{ width: "100%", maxWidth: 720, background: "#111118", border: "1px solid #1e1e30", borderRadius: 16, padding: 24, marginBottom: 24, boxShadow: "0 20px 60px rgba(0,0,0,0.5)" }}>
              <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
                <TagInput
                  label="Customer Entity Countries"
                  options={ALL_WORLD_COUNTRIES}
                  selected={contracting}
                  onAdd={addContracting}
                  onRemove={removeContracting}
                  placeholder="Type to add countries..."
                  dotFn={contractingDot}
                />
                <div style={{ display: "flex", alignItems: "center", paddingTop: 28, color: "#94a3b8", fontSize: 18, flexShrink: 0 }}>-></div>
                <TagInput
                  label="Member Coverage Countries"
                  options={ALL_WORLD_COUNTRIES}
                  selected={coverageCountries}
                  onAdd={addCoverage}
                  onRemove={removeCoverage}
                  placeholder="Type to add countries..."
                  dotFn={(c) => getDotColor(contracting, c)}
                />
              </div>
              {(contracting.length > 0 || coverageCountries.length > 0) && (
                <div style={{ marginTop: 14, textAlign: "right" }}>
                  <span onClick={() => { setContracting([]); setCoverageCountries([]); }} style={{ fontSize: 12, color: "#94a3b8", cursor: "pointer", textDecoration: "underline" }}>Clear all</span>
                </div>
              )}
              <div style={{ marginTop: 20 }}>
                <label style={{ fontSize: 11, letterSpacing: "0.08em", textTransform: "uppercase", color: "#94a3b8", display: "block", marginBottom: 7 }}>Industry (optional)</label>
                <select
                  value={industry}
                  onChange={e => setIndustry(e.target.value)}
                  style={{ width: "100%", background: "#0d0d1a", border: `1px solid ${industry ? "#f97316" : "#2a2a40"}`, borderRadius: 8, padding: "10px 12px", color: industry ? "#e2e8f0" : "#64748b", fontSize: 14, outline: "none", appearance: "none", WebkitAppearance: "none", cursor: "pointer" }}
                >
                  <option value="">No restricted industry</option>
                  {HIGH_RISK_INDUSTRIES.map(i => <option key={i} value={i}>{i}</option>)}
                </select>
              </div>
            </div>

            {showResults && (
              <TimelineNote contracting={contracting} coverageCountries={coverageCountries} industry={industry} />
            )}

            {showResults && (
              <div style={{ width: "100%", maxWidth: 720, background: "#111118", border: "1px solid #1e1e30", borderRadius: 16, overflow: "hidden", boxShadow: "0 20px 60px rgba(0,0,0,0.5)", marginBottom: 32 }}>
                <SummaryBar contracting={contracting} coverageCountries={coverageCountries} />
                <div>
                  {coverageCountries.map((country, i) => (
                    <ResultRow key={country} contracting={contracting} country={country} index={i} />
                  ))}
                </div>
              </div>
            )}

            {!showResults && (
              <div style={{ color: "#94a3b8", fontSize: 13, textAlign: "center", marginTop: 4, marginBottom: 32 }}>
                {contracting.length === 0 ? "Start by adding the countries where the customer has business entities" : "Now add one or more member coverage countries"}
              </div>
            )}

            <div style={{ width: "100%", maxWidth: 720 }}>
              <h3 style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#94a3b8", marginBottom: 12 }}>Coverage Tiers</h3>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                {[
                  { dot: "#22c55e", label: "No Additional KYC", desc: "Covered under the customer's entity region. Standard regional KYC applies, but no additional KYC beyond that." },
                  { dot: "#f59e0b", label: "Conditional", desc: "Customer needs to go through additional KYC to support this country or region." },
                  { dot: "#ef4444", label: "Not Eligible", desc: "Customer does not have an entity in the required country or region." },
                  { dot: "#64748b", label: "Not Supported", desc: "Country is not currently supported by Airwallex card issuance." },
                ].map(tier => (
                  <div key={tier.label} style={{ flex: "1 1 200px", display: "flex", alignItems: "flex-start", gap: 10, background: "#111118", border: "1px solid #1e1e30", borderRadius: 10, padding: "12px 14px" }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: tier.dot, marginTop: 4, flexShrink: 0 }} />
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#e2e8f0", marginBottom: 3 }}>{tier.label}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.5 }}>{tier.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <DevEstimates />
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
